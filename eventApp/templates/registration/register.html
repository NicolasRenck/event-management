{% extends 'base.html' %}

{% block content %}

<div class="auth-card">
    <div class="auth-left">
        <div class="badge">Event Management</div>
        <h1>Welcome back</h1>
        <p>Create your account to start managing events.</p>
    </div>
    <div class="auth-right">
        <h2>Register</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Register</button>
            <a href="{% url 'login' %}">Already have an account? Login</a>
        </form>
    </div>
</div>

{% endblock %}
