{% extends 'base.html' %}

{% block content %}

<div class="auth-card">
    <h2>Login</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Login</button>
        <a href="{% url 'register' %}">Don't have an account? Register</a>
    </form>
</div>

{% endblock %}
