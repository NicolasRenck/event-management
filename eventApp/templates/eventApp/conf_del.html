{% extends 'base.html' %}

{% block content %}

<div class="form-page">
    <div class="form-page-left">
        <div class="form-page-decoration">
            <div class="deco-circle deco-1"></div>
            <div class="deco-circle deco-2"></div>
            <div class="deco-circle deco-3"></div>
        </div>
        <div class="form-page-text">
            <span class="form-tag">Warning</span>
            <h1>Delete<br>Event</h1>
            <p>This action is permanent and cannot be undone.</p>
        </div>
    </div>

    <div class="form-page-right">
        <div class="form-card">
            <h2>Are you sure?</h2>
            <p class="delete-msg">You are about to delete <strong>{{ events.nameEvent }}</strong>. This action cannot be undone.</p>
            <form method="post">
                {% csrf_token %}
                <div class="form-actions">
                    <button type="submit" class="btn-danger">Yes, delete</button>
                    <a href="{% url 'events' %}">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
